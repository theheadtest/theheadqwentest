<script>
/** 
 * UTILS & NOISE 
 */
// Simple seeded random
class RNG {
    constructor(seed) {
        this.seed = seed.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
    }
    next() {
        this.seed = (this.seed * 9301 + 49297) % 233280;
        return this.seed / 233280;
    }
}

// Simple Perlin Noise Implementation
const Perlin = (function() {
    const permutation = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
    const p = new Array(512);
    for (let i=0; i < 256; i++) p[256+i] = p[i] = permutation[i];

    function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    function lerp(t, a, b) { return a + t * (b - a); }
    function grad(hash, x, y, z) {
        const h = hash & 15;
        const u = h < 8 ? x : y, v = h < 4 ? y : h === 12 || h === 14 ? x : z;
        return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
    }

    return {
        noise: function(x, y, z) {
            const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
            x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
            const u = fade(x), v = fade(y), w = fade(z);
            const A = p[X]+Y, AA = p[A]+Z, AB = p[A+1]+Z, B = p[X+1]+Y, BA = p[B]+Z, BB = p[B+1]+Z;
            return lerp(w,
                lerp(v,
                    lerp(u, grad(p[AA], x, y, z), grad(p[BA], x-1, y, z)),
                    lerp(u, grad(p[AB], x, y-1, z), grad(p[BB], x-1, y-1, z))
                ),
                lerp(v,
                    lerp(u, grad(p[AA+1], x, y, z-1), grad(p[BA+1], x-1, y, z-1)),
                    lerp(u, grad(p[AB+1], x, y-1, z-1), grad(p[BB+1], x-1, y-1, z-1))
                )
            );
        }
    };
})();

/** 
 * TAB SWITCHING 
 */
function switchTab(tabId) {

    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

    document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
    
    if(tabId === 'tab2') {
        resizeAzgaarCanvas();
        if(azCells.length === 0) {
            // Initialize azgaar if first time visiting tab
            runAzgaar();
        } else {
            // Redraw when switching to tab2 even if already initialized
            drawAzgaar();
        }
    }
}

/** 
 * TAB 1: ALGORITHM COMPARISON LOGIC 
 */
function generateAll() {
    const seedVal = document.getElementById('seed').value;
    const rng = new RNG(seedVal);
    const scale = parseInt(document.getElementById('scale').value);
    const octaves = parseInt(document.getElementById('octaves').value);
    const persistence = parseFloat(document.getElementById('persistence').value);
    const waterLevel = parseFloat(document.getElementById('water').value);
    const size = 512;

    const container = document.getElementById('results-container');
    container.innerHTML = '';

    const algorithms = [
        { name: 'Perlin Noise', fn: generatePerlin },
        { name: 'Voronoi Basic', fn: generateVoronoi },
        { name: 'Cellular Automata', fn: generateCellular },
        { name: 'Midpoint Displacement', fn: generateMidpoint },
        { name: 'Hybrid (Perlin+Voronoi)', fn: generateHybrid }
    ];

    // Sequential generation simulation
    let index = 0;
    function next() {
        if (index >= algorithms.length) return;
        
        const algo = algorithms[index];
        console.log(`Generating ${algo.name}...`);
        const start = performance.now();
        
        const data = algo.fn(rng, size, scale, octaves, persistence);
        const canvas = renderMap(data, size, waterLevel);
        
        const end = performance.now();
        const time = (end - start).toFixed(2);
        console.log(`${algo.name} completed in ${time}ms`);

        const card = document.createElement('div');
        card.className = 'map-card';
        card.innerHTML = `
            <h3>${algo.name}</h3>
            <div style="position:relative; display:inline-block;">
                <canvas width="${size}" height="${size}" style="width:100%; max-width:300px;"></canvas>
            </div>
            <div class="stats">Time: ${time}ms</div>
        `;
        card.querySelector('canvas').getContext('2d').drawImage(canvas, 0, 0);
        container.appendChild(card);

        index++;
        setTimeout(next, 50); // Small delay to allow UI update
    }
    next();
}

function generatePerlin(rng, size, scale, octaves, persistence) {
    const data = new Float32Array(size * size);
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            let noise = 0;
            let amp = 1;
            let freq = scale;
            let maxVal = 0;
            for (let o = 0; o < octaves; o++) {
                noise += Perlin.noise(x / freq, y / freq, 0) * amp;
                maxVal += amp;
                amp *= persistence;
                freq *= 2;
            }
            data[y * size + x] = (noise / maxVal + 1) / 2; // Normalize 0-1
        }
    }
    return data;
}

function generateVoronoi(rng, size, scale, octaves, persistence) {
    const pointsCount = 100;
    const points = [];
    for(let i=0; i<pointsCount; i++) {
        points.push({
            x: Math.floor(rng.next() * size),
            y: Math.floor(rng.next() * size),
            val: rng.next()
        });
    }
    
    const data = new Float32Array(size * size);
    // Simple brute force voronoi for demo (slow but works without libs for 512x512)
    // Optimization: In real app use d3-delaunay
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            let minDist = Infinity;
            let val = 0;
            for (let p of points) {
                const dx = x - p.x;
                const dy = y - p.y;
                const dist = dx*dx + dy*dy;
                if (dist < minDist) {
                    minDist = dist;
                    val = p.val;
                }
            }
            data[y * size + x] = val;
        }
    }
    return data;
}

function generateCellular(rng, size, scale, octaves, persistence) {
    const grid = new Uint8Array(size * size);
    const initProb = 0.45;
    // Init
    for(let i=0; i<size*size; i++) grid[i] = rng.next() < initProb ? 1 : 0;
    
    // Iterate
    for(let k=0; k<4; k++) {
        const next = new Uint8Array(size * size);
        for(let y=1; y<size-1; y++) {
            for(let x=1; x<size-1; x++) {
                let neighbors = 0;
                for(let dy=-1; dy<=1; dy++) {
                    for(let dx=-1; dx<=1; dx++) {
                        if(dx===0 && dy===0) continue;
                        neighbors += grid[(y+dy)*size + (x+dx)];
                    }
                }
                const idx = y*size+x;
                if (grid[idx] === 1) next[idx] = neighbors >= 4 ? 1 : 0;
                else next[idx] = neighbors >= 5 ? 1 : 0;
            }
        }
        for(let i=0; i<size*size; i++) grid[i] = next[i];
    }
    
    // Convert to float 0/1
    const data = new Float32Array(size * size);
    for(let i=0; i<size*size; i++) data[i] = grid[i];
    return data;
}

function generateMidpoint(rng, size, scale, octaves, persistence) {
    // Diamond Square on 513x513 then crop or just 512 power of 2 + 1
    const dim = 513; 
    const map = new Float32Array(dim * dim);
    
    // Corners
    map[0] = rng.next();
    map[dim-1] = rng.next();
    map[dim*(dim-1)] = rng.next();
    map[dim*dim-1] = rng.next();

    let step = dim - 1;
    let range = 1.0;
    
    while (step > 1) {
        const half = Math.floor(step / 2);
        
        // Diamond
        for (let y = 0; y < dim - 1; y += step) {
            for (let x = 0; x < dim - 1; x += step) {
                const tl = map[y * dim + x];
                const tr = map[y * dim + x + step];
                const bl = map[(y + step) * dim + x];
                const br = map[(y + step) * dim + x + step];
                const avg = (tl + tr + bl + br) / 4;
                map[(y + half) * dim + (x + half)] = avg + (rng.next() * 2 - 1) * range;
            }
        }
        
        // Square
        for (let y = 0; y < dim; y += half) {
            for (let x = (y + half) % step; x < dim; x += step) {
                let sum = 0, count = 0;
                if (y >= half) { sum += map[(y - half) * dim + x]; count++; }
                if (y + half < dim) { sum += map[(y + half) * dim + x]; count++; }
                if (x >= half) { sum += map[y * dim + (x - half)]; count++; }
                if (x + half < dim) { sum += map[y * dim + (x + half)]; count++; }
                
                map[y * dim + x] = (sum / count) + (rng.next() * 2 - 1) * range;
            }
        }
        
        range *= persistence;
        step = half;
    }
    
    // Crop to 512 and normalize
    const data = new Float32Array(size * size);
    let min = Infinity, max = -Infinity;
    for(let y=0; y<size; y++) {
        for(let x=0; x<size; x++) {
            const val = map[y*dim+x];
            if(val < min) min = val;
            if(val > max) max = val;
            data[y*size+x] = val;
        }
    }
    // Normalize
    const rangeVal = max - min;
    for(let i=0; i<data.length; i++) {
        data[i] = (data[i] - min) / rangeVal;
    }
    return data;
}

function generateHybrid(rng, size, scale, octaves, persistence) {
    const perlin = generatePerlin(rng, size, scale, octaves, persistence);
    const voronoi = generateVoronoi(rng, size, scale, octaves, persistence);
    const data = new Float32Array(size * size);
    for(let i=0; i<size*size; i++) {
        data[i] = (perlin[i] * 0.7) + (voronoi[i] * 0.3);
    }
    return data;
}

function renderMap(data, size, waterLevel) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(size, size);
    
    for (let i = 0; i < data.length; i++) {
        const val = data[i];
        const idx = i * 4;
        let r, g, b;
        
        if (val < waterLevel) {
            // Water deepness
            const depth = val / waterLevel;
            r = 20; g = 50 + depth*50; b = 150 + depth*50;
        } else if (val < waterLevel + 0.1) {
            // Beach
            r = 210; g = 200; b = 150;
        } else if (val < 0.6) {
            // Green
            r = 50; g = 150 + (val-0.5)*200; b = 50;
        } else if (val < 0.8) {
            // Rock
            r = 100; g = 100; b = 100;
        } else {
            // Snow
            r = 255; g = 255; b = 255;
        }
        
        imgData.data[idx] = r;
        imgData.data[idx+1] = g;
        imgData.data[idx+2] = b;
        imgData.data[idx+3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
    return canvas;
}

/** 
 * TAB 2: AZGAAR SIMPLIFIED LOGIC 
 */
let azPoints = [];
let azCells = []; // {x, y, neighbors, elevation, moisture, biome}
let azDelaunay = null;
let azVoronoi = null;
let azRivers = [];
let showBiomes = true;
let canvas, ctx;
let azgaarResizeHandlerAttached = false;

// Biome Colors
const BIOMES = {
    DEEP_OCEAN: { color: [20, 40, 80], name: "Deep Ocean" },
    OCEAN: { color: [30, 60, 120], name: "Ocean" },
    BEACH: { color: [210, 200, 150], name: "Beach" },
    LAGOON: { color: [100, 200, 200], name: "Lagoon" },
    GRASS: { color: [92, 176, 74], name: "Grassland" },
    FOREST: { color: [39, 125, 53], name: "Forest" },
    RAINFOREST: { color: [23, 92, 45], name: "Rainforest" },
    SAVANNA: { color: [168, 170, 75], name: "Savanna" },
    DESERT: { color: [213, 183, 105], name: "Desert" },
    TUNDRA: { color: [151, 166, 147], name: "Tundra" },
    MOUNTAIN: { color: [112, 108, 101], name: "Mountain" },
    SNOW: { color: [240, 240, 250], name: "Snow" }
};

function clamp01(value) {
    return Math.max(0, Math.min(1, Number.isFinite(value) ? value : 0));
}

function normalizedNoise(x, y, z = 0) {
    return clamp01((Perlin.noise(x, y, z) + 1) / 2);
}

function resizeAzgaarCanvas() {
    if (!canvas) return false;

    const parent = canvas.parentElement;
    const width = Math.floor(parent.clientWidth || parent.getBoundingClientRect().width);
    const height = Math.floor(parent.clientHeight || parent.getBoundingClientRect().height);

    // Hidden tabs report a 0x0 layout. Keep the previous backing store so the
    // next visible draw does not build a zero-sized Voronoi diagram.
    if (width <= 0 || height <= 0) return false;

    if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
    }

    return true;
}

function initAzgaar() {
    canvas = document.getElementById('azgaar-canvas');
    ctx = canvas.getContext('2d');
    
    if (!azgaarResizeHandlerAttached) {
        window.addEventListener('resize', () => {
            if (resizeAzgaarCanvas() && azPoints.length > 0) drawAzgaar();
        });
        azgaarResizeHandlerAttached = true;
    }
    resizeAzgaarCanvas();
    
    // Tooltip
    const tooltip = document.getElementById('az-tooltip');
    canvas.addEventListener('mousemove', e => {
        if(azCells.length === 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        // Find cell index
        // Simple search (optimized in real app)
        // Using delaunay.find is faster
        if(azDelaunay) {
            const idx = azDelaunay.find(x, y);
            const cell = azCells[idx];
            if(cell) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                const elevation = Number.isFinite(cell.elevation) ? cell.elevation.toFixed(2) : "n/a";
                const moisture = Number.isFinite(cell.moisture) ? cell.moisture.toFixed(2) : "n/a";
                const river = cell.river ? "<br>River: yes" : "";
                tooltip.innerHTML = `
                    <strong>${cell.biome.name}</strong><br>
                    Elevation: ${elevation}<br>
                    Moisture: ${moisture}${river}
                `;
            }
        }
    });
    canvas.addEventListener('mouseleave', () => tooltip.style.display = 'none');

    // Update slider label
    document.getElementById('az-size').addEventListener('input', (e) => {
        document.getElementById('az-size-val').textContent = e.target.value + " points";
    });
}

function runAzgaar() {
    if(!ctx) initAzgaar();
    if(!resizeAzgaarCanvas()) {
        console.warn('[AZGAAR] Canvas is not visible yet; open the Azgaar tab before generating.');
        return;
    }
    
    const seedStr = document.getElementById('az-seed').value;
    const rng = new RNG(seedStr);
    const numPoints = parseInt(document.getElementById('az-size').value);
    const radius = parseFloat(document.getElementById('az-radius').value);
    const noiseInt = parseFloat(document.getElementById('az-noise').value);
    const riverCount = parseInt(document.getElementById('az-rivers').value);
    
    console.log("=== [AZGAAR] Starting Generation ===");
    console.log("Azgaar: Generating world...", {numPoints, radius, noiseInt, riverCount, seed: seedStr});

    // 1. Generate Points (with simple jitter)
    azPoints = [];
    const w = canvas.width;
    const h = canvas.height;
    const centerX = w/2, centerY = h/2;
    const minDim = Math.min(w, h);
    
    console.log(`[AZGAAR] Canvas size: ${w}x${h}, generating ${numPoints} points...`);
    
    for(let i=0; i<numPoints; i++) {
        // Random point in circle
        const angle = rng.next() * Math.PI * 2;
        const r = Math.sqrt(rng.next()) * (minDim/2) * radius;
        azPoints.push([centerX + Math.cos(angle)*r, centerY + Math.sin(angle)*r]);
    }
    console.log(`[AZGAAR] Generated ${azPoints.length} initial points.`);
    
    // 2. Lloyd's Relaxation (3 iterations)
    console.log("[AZGAAR] Starting Lloyd's relaxation...");
    for(let iter=0; iter<3; iter++) {
        azDelaunay = d3.Delaunay.from(azPoints);
        azVoronoi = azDelaunay.voronoi([0, 0, w, h]);
        const newPoints = [];
        for(let i=0; i<numPoints; i++) {
            const cell = azVoronoi.cellPolygon(i);
            if(!cell || cell.length < 3) {
                newPoints.push(azPoints[i]);
                continue;
            }
            
            let cx = 0, cy = 0, area = 0;
            
            for (let j = 0; j < cell.length - 1; j++) {
                const p1 = cell[j];
                const p2 = cell[j + 1];
            
                const cross = p1[0] * p2[1] - p2[0] * p1[1];
                cx += (p1[0] + p2[0]) * cross;
                cy += (p1[1] + p2[1]) * cross;
                area += cross;
            }
            
            area /= 2;
            
            if (Math.abs(area) < 1e-6) {
                newPoints.push(azPoints[i]);
                continue;
            }
            
            cx /= (6 * area);
            cy /= (6 * area);

            newPoints.push([cx, cy]);
        }
        azPoints = newPoints;
        console.log(`[AZGAAR] Relaxation iteration ${iter+1} complete.`);
    }
    console.log("[AZGAAR] Relaxation complete.");
    
    // Rebuild Voronoi after relaxation
    azDelaunay = d3.Delaunay.from(azPoints);
    azVoronoi = azDelaunay.voronoi([0, 0, w, h]);
    console.log(`[AZGAAR] Voronoi diagram created with ${azPoints.length} cells.`);
    
    // 3. Initialize Cells
    azCells = azPoints.map((p, i) => ({
        x: p[0], y: p[1],
        elevation: 0, moisture: 0, biome: BIOMES.OCEAN,
        river: false,
        neighbors: [] // indices
    }));
    console.log(`[AZGAAR] Initialized ${azCells.length} cells.`);
    
    // Find neighbors via Delaunay
    for(let i=0; i<numPoints; i++) {
        const neighbors = azDelaunay.neighbors(i);
        for(let n of neighbors) azCells[i].neighbors.push(n);
    }
    console.log("[AZGAAR] Neighbor relationships established.");
    
    // 4. Height Map (Radial + multi-scale noise)
    let elevMin = Infinity, elevMax = -Infinity;
    const seedOffset = rng.next() * 1000;
    for(let i=0; i<numPoints; i++) {
        const dx = (azPoints[i][0] - centerX) / (minDim/2);
        const dy = (azPoints[i][1] - centerY) / (minDim/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        // Radial falloff gives the world a readable island/coastline shape.
        const island = clamp01(1 - Math.pow(dist / radius, 1.7));
        const nx = (azPoints[i][0] + seedOffset) / minDim;
        const ny = (azPoints[i][1] - seedOffset) / minDim;
        const continents = normalizedNoise(nx * 2.2, ny * 2.2, seedOffset * 0.01);
        const hills = normalizedNoise(nx * 7.5, ny * 7.5, seedOffset * 0.02);
        const ridges = 1 - Math.abs(normalizedNoise(nx * 13, ny * 13, seedOffset * 0.03) * 2 - 1);
        
        let height = island * 0.72 + continents * noiseInt * 0.22 + hills * noiseInt * 0.13 + ridges * noiseInt * 0.10 - 0.18;
        // Push outer cells below sea level so oceans do not disappear after normalization.
        height -= Math.max(0, dist - radius * 0.86) * 0.65;
        
        azCells[i].elevation = height;
        if(height < elevMin) elevMin = height;
        if(height > elevMax) elevMax = height;
    }
    console.log(`[AZGAAR] Raw height map generated. Elevation range: ${elevMin.toFixed(3)} - ${elevMax.toFixed(3)}`);
    // Normalize while preserving enough low terrain for oceans and beaches.
    const range = elevMax - elevMin || 1;
    for (let i = 0; i < numPoints; i++) {
        azCells[i].elevation = clamp01((azCells[i].elevation - elevMin) / range);
    }
    
    // 5. Moisture Map (Precipitation)
    // Reset moisture
    azCells.forEach(c => c.moisture = 0);
    // Rain sources (windward side)
    const windAngle = rng.next() * Math.PI * 2;
    const wx = Math.cos(windAngle), wy = Math.sin(windAngle);
    
    for(let i=0; i<numPoints; i++) {
        const dx = (azPoints[i][0] - centerX) / (minDim/2);
        const dy = (azPoints[i][1] - centerY) / (minDim/2);
        const dot = dx*wx + dy*wy; // -1 (leeward) to 1 (windward)
        const windwardRain = clamp01((dot + 1) / 2);
        const localNoise = normalizedNoise((azPoints[i][0] - seedOffset) / 150, (azPoints[i][1] + seedOffset) / 150, 7);
        const coastalHumidity = azCells[i].elevation < 0.24 ? 0.95 : Math.max(0, 0.45 - azCells[i].elevation * 0.35);
        const rainShadow = Math.max(0, azCells[i].elevation - 0.58) * 0.55;
        azCells[i].moisture = clamp01(windwardRain * 0.45 + localNoise * 0.35 + coastalHumidity - rainShadow);
    }
    
    // Diffuse moisture slightly
    for(let k=0; k<2; k++) {
        const oldMoist = azCells.map(c => c.moisture);
        for(let i=0; i<numPoints; i++) {
            let sum = oldMoist[i];
            let count = 1;
            for(let n of azCells[i].neighbors) {
                sum += oldMoist[n];
                count++;
            }
            azCells[i].moisture = sum / count;
        }
    }
    let moistMin = Infinity, moistMax = -Infinity;
    azCells.forEach(c => {
        c.moisture = clamp01(c.moisture);
        if(c.moisture < moistMin) moistMin = c.moisture;
        if(c.moisture > moistMax) moistMax = c.moisture;
    });
    const moistRange = moistMax - moistMin || 1;
    azCells.forEach(c => c.moisture = clamp01((c.moisture - moistMin) / moistRange));
    moistMin = Infinity; moistMax = -Infinity;
    azCells.forEach(c => { if(c.moisture < moistMin) moistMin = c.moisture; if(c.moisture > moistMax) moistMax = c.moisture; });
    console.log(`[AZGAAR] Moisture map generated. Range: ${moistMin.toFixed(3)} - ${moistMax.toFixed(3)}`);
    
    // 6. Rivers (downhill paths + light erosion)
    azRivers = [];
    azCells.forEach(c => c.river = false);
    const sources = azCells
        .map((cell, index) => ({ index, score: cell.elevation + cell.moisture * 0.2 + rng.next() * 0.15 }))
        .filter(({index}) => azCells[index].elevation > 0.48 && azCells[index].moisture > 0.18)
        .sort((a, b) => b.score - a.score);

    for(let r=0; r<riverCount && sources.length > 0; r++) {
        const source = sources.shift();
        let curr = source.index;
        const path = [curr];
        const visited = new Set([curr]);

        for(let step=0; step<80; step++) {
            const current = azCells[curr];
            current.river = true;
            current.moisture = clamp01(current.moisture + 0.25);
            current.elevation = clamp01(current.elevation - 0.015);

            if(current.elevation < 0.20) break;

            let next = -1;
            let bestScore = Infinity;
            for(let n of current.neighbors) {
                if(visited.has(n)) continue;
                // Prefer downhill flow, but allow small side moves to escape local bowls.
                const slopePenalty = azCells[n].elevation > current.elevation ? 0.35 : 0;
                const score = azCells[n].elevation + slopePenalty - azCells[n].moisture * 0.04 + rng.next() * 0.03;
                if(score < bestScore) {
                    bestScore = score;
                    next = n;
                }
            }

            if(next === -1) break;
            curr = next;
            visited.add(curr);
            path.push(curr);
        }

        if(path.length > 3) azRivers.push(path);
    }
    console.log(`[AZGAAR] River generation complete (${azRivers.length}/${riverCount} rivers).`);
    
    // 7. Assign Biomes
    const legendSet = new Set();
    let oceanCount = 0, landCount = 0;
    for(let i=0; i<numPoints; i++) {
        const c = azCells[i];
        const e = c.elevation;
        const m = c.moisture;
        
        if(e < 0.10) { c.biome = BIOMES.DEEP_OCEAN; oceanCount++; }
        else if(e < 0.18) { c.biome = BIOMES.OCEAN; oceanCount++; }
        else if(e < 0.23) { c.biome = m > 0.75 ? BIOMES.LAGOON : BIOMES.BEACH; landCount++; }
        else if(e > 0.86) { c.biome = BIOMES.SNOW; landCount++; }
        else if(e > 0.68) { c.biome = m < 0.35 ? BIOMES.MOUNTAIN : BIOMES.TUNDRA; landCount++; }
        else {
            landCount++;
            if(m < 0.18) c.biome = BIOMES.DESERT;
            else if(m < 0.36) c.biome = BIOMES.SAVANNA;
            else if(m < 0.62) c.biome = BIOMES.GRASS;
            else if(m < 0.84) c.biome = BIOMES.FOREST;
            else c.biome = BIOMES.RAINFOREST;
        }
        legendSet.add(c.biome.name);
    }
    console.log(`[AZGAAR] Biomes assigned. Ocean: ${oceanCount}, Land: ${landCount}`);
    console.log(`[AZGAAR] Biome types:`, Array.from(legendSet));
    
    updateLegend(legendSet);
    console.log("[AZGAAR] Calling drawAzgaar()...");
    drawAzgaar();
    console.log("=== [AZGAAR] Generation Complete ===");
}

function regenerateAzgaarTerrain() {
    // Keep points, re-roll height/moisture
    // Just call runAzgaar but preserve azPoints? 
    // For simplicity, just re-run but maybe keep seed same?
    // Let's just randomize seed slightly or re-run
    const seedInput = document.getElementById('az-seed');
    seedInput.value = seedInput.value + "_r";
    runAzgaar();
}

function toggleBiomes() {
    showBiomes = !showBiomes;
    drawAzgaar();
}

function updateLegend(set) {
    const container = document.getElementById('az-legend');
    container.innerHTML = '';
    // Order matters
    const order = ["Deep Ocean", "Ocean", "Beach", "Lagoon", "Desert", "Savanna", "Grassland", "Forest", "Rainforest", "Tundra", "Mountain", "Snow"];
    
    order.forEach(name => {
        if(set.has(name)) {
            // Find key
            const key = Object.keys(BIOMES).find(k => BIOMES[k].name === name);
            const b = BIOMES[key];
            const div = document.createElement('div');
            div.className = 'legend-item';
            div.innerHTML = `<div class="color-box" style="background:rgb(${b.color.join(',')})"></div><span>${name}</span>`;
            container.appendChild(div);
        }
    });
}

function drawAzgaar() {
    if(!ctx || azCells.length === 0) return;
    if(!resizeAzgaarCanvas()) return;
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    
    // Draw Cells
    for(let i=0; i<azCells.length; i++) {
        const cell = azVoronoi.cellPolygon(i);
        if (!cell || cell.length < 3) continue;
        
        ctx.beginPath();
        ctx.moveTo(cell[0][0], cell[0][1]);
        
        for (let j = 1; j < cell.length; j++) {
            ctx.lineTo(cell[j][0], cell[j][1]);
        }
        
        ctx.closePath();
        
        const cellData = azCells[i]; // Get the actual cell data with biome/elevation
        const b = showBiomes ? cellData.biome : null;
        if(b) {
            ctx.fillStyle = `rgb(${b.color.join(',')})`;
        } else {
            // Height map view
            const e = cellData.elevation;
            const val = Math.floor(e * 255);
            ctx.fillStyle = `rgb(${val}, ${val}, ${val})`;
        }
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.stroke();
    }
    
    // Draw river paths over the biome fill so generated rivers are visible.
    if (showBiomes && azRivers.length > 0) {
        ctx.save();
        ctx.strokeStyle = "rgba(58, 143, 210, 0.95)";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (const path of azRivers) {
            if (path.length < 2) continue;
            ctx.beginPath();
            ctx.moveTo(azCells[path[0]].x, azCells[path[0]].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(azCells[path[i]].x, azCells[path[i]].y);
            }
            ctx.stroke();
        }
        ctx.restore();
    }

    // Subtle coastline/border tone; cell borders already carry the main structure.
    ctx.strokeStyle = "rgba(0,0,0,0.3)";
    ctx.lineWidth = 1;
}

// Initial Gen for Tab 1
window.onload = () => {
    generateAll();
    // Initialize Azgaar tab but don't run until tab is selected
    initAzgaar();
};
