<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeGuessr Lite</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #020617; color: #e2e8f0; }
      .wrap { width: min(1200px, calc(100% - 24px)); margin: 20px auto 28px; }
      .panel { background: rgba(15,23,42,.9); border: 1px solid rgba(148,163,184,.24); border-radius: 16px; padding: 14px; }
      .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 12px; }
      #guessMap, #resultMap { height: 480px; border-radius: 12px; }
      .viewer { width: 100%; height: 480px; border: 0; border-radius: 12px; background: #0f172a; }
      button { border: 0; border-radius: 999px; padding: 10px 16px; font-weight: 700; cursor: pointer; }
      button.primary { background: #22d3ee; color: #06202a; }
      button.secondary { background: #334155; color: #e2e8f0; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 10px 0; }
      .pill { background: #0b1224; border: 1px solid rgba(148,163,184,.28); padding: 6px 10px; border-radius: 999px; }
      .score { font-size: 1.2rem; font-weight: 800; }
      a { color: #67e8f9; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } #guessMap, #resultMap, .viewer { height: 350px; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>🧭 FreeGuessr Lite</h1>
      <p>
        Seeded mini geo-guessing prototype using free stack pieces: Leaflet + OSM and image rounds you can swap to
        Mapillary/KartaView later.
      </p>

      <section class="panel">
        <div class="row">
          <button id="startBtn" class="primary">Start game</button>
          <button id="submitBtn" class="secondary" disabled>Submit guess</button>
          <button id="nextBtn" class="secondary" disabled>Next round</button>
          <button id="shareBtn" class="secondary">Copy share URL</button>
          <span class="pill" id="seedText"></span>
          <span class="pill" id="roundText">Round 0 / 5</span>
          <span class="pill score" id="scoreText">Score: 0</span>
        </div>
        <div id="status">Press <strong>Start game</strong> to begin.</div>
      </section>

      <section class="grid" style="margin-top:12px;">
        <article class="panel">
          <h3>Challenge view</h3>
          <img id="sceneImage" class="viewer" alt="Challenge scene" />
          <p id="sceneMeta"></p>
        </article>
        <article class="panel">
          <h3>Your guess map</h3>
          <div id="guessMap"></div>
        </article>
      </section>

      <section class="panel" style="margin-top:12px;">
        <h3>Final results map</h3>
        <div id="resultMap"></div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      "use strict";
      const ROUND_COUNT = 5;
      const MAX_POINTS = 5000;
      const LOCATION_POOL = [
        { name: "Tokyo, Japan", lat: 35.6895, lng: 139.6917, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Shibuya_Crossing%2C_Tokyo%2C_Japan_%282018%29.jpg/1280px-Shibuya_Crossing%2C_Tokyo%2C_Japan_%282018%29.jpg" },
        { name: "Paris, France", lat: 48.8566, lng: 2.3522, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Paris_Night.jpg/1280px-Paris_Night.jpg" },
        { name: "New York, USA", lat: 40.7128, lng: -74.006, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/New_york_times_square-terabass.jpg/1280px-New_york_times_square-terabass.jpg" },
        { name: "Cape Town, South Africa", lat: -33.9249, lng: 18.4241, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Cape_Town_CBD.jpg/1280px-Cape_Town_CBD.jpg" },
        { name: "Sydney, Australia", lat: -33.8688, lng: 151.2093, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Sydney_Opera_House%2C_-_Dec_2008.jpg/1280px-Sydney_Opera_House%2C_-_Dec_2008.jpg" },
        { name: "Mexico City, Mexico", lat: 19.4326, lng: -99.1332, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Mexico_City_Montage_2017.png/1280px-Mexico_City_Montage_2017.png" },
        { name: "Cairo, Egypt", lat: 30.0444, lng: 31.2357, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Kheops-Pyramid.jpg/1280px-Kheops-Pyramid.jpg" },
        { name: "Rio de Janeiro, Brazil", lat: -22.9068, lng: -43.1729, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Rio_de_Janeiro_City.jpg/1280px-Rio_de_Janeiro_City.jpg" }
      ];

      const url = new URL(window.location.href);
      const seed = Number.parseInt(url.searchParams.get("seed"), 10) || Math.floor(Math.random() * 1e9);
      const seedEl = document.getElementById("seedText");
      seedEl.textContent = `Seed: ${seed}`;

      function mulberry32(a) {
        return function () {
          let t = (a += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function pickRounds() {
        const rng = mulberry32(seed);
        const bag = [...LOCATION_POOL];
        const rounds = [];
        for (let i = 0; i < ROUND_COUNT; i += 1) {
          const idx = Math.floor(rng() * bag.length);
          rounds.push(bag.splice(idx, 1)[0]);
        }
        return rounds;
      }

      function haversineKm(a, b) {
        const toRad = (x) => (x * Math.PI) / 180;
        const R = 6371;
        const dLat = toRad(b.lat - a.lat);
        const dLng = toRad(b.lng - a.lng);
        const lat1 = toRad(a.lat);
        const lat2 = toRad(b.lat);
        const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
        return 2 * R * Math.asin(Math.sqrt(h));
      }

      function pointsForDistance(km) {
        return Math.max(0, Math.round(MAX_POINTS * Math.exp(-km / 2200)));
      }

      const rounds = pickRounds();
      let roundIndex = -1;
      let totalScore = 0;
      let guessMarker = null;
      let guessLatLng = null;
      const logs = [];

      const guessMap = L.map("guessMap", { worldCopyJump: true }).setView([20, 0], 2);
      const resultMap = L.map("resultMap", { worldCopyJump: true }).setView([20, 0], 2);

      const tileOptions = {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      };
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", tileOptions).addTo(guessMap);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", tileOptions).addTo(resultMap);

      const statusEl = document.getElementById("status");
      const roundText = document.getElementById("roundText");
      const scoreText = document.getElementById("scoreText");
      const sceneImage = document.getElementById("sceneImage");
      const sceneMeta = document.getElementById("sceneMeta");
      const startBtn = document.getElementById("startBtn");
      const submitBtn = document.getElementById("submitBtn");
      const nextBtn = document.getElementById("nextBtn");

      guessMap.on("click", (event) => {
        guessLatLng = { lat: event.latlng.lat, lng: event.latlng.lng };
        if (guessMarker) guessMap.removeLayer(guessMarker);
        guessMarker = L.marker(event.latlng).addTo(guessMap);
        submitBtn.disabled = false;
      });

      function renderRound() {
        const current = rounds[roundIndex];
        roundText.textContent = `Round ${roundIndex + 1} / ${ROUND_COUNT}`;
        sceneImage.src = current.image;
        sceneMeta.textContent = "Guess where this location is. (Name hidden until submit.)";
        statusEl.textContent = "Place one marker on the map and submit your guess.";
        submitBtn.disabled = true;
        nextBtn.disabled = true;
        guessLatLng = null;
        if (guessMarker) { guessMap.removeLayer(guessMarker); guessMarker = null; }
      }

      function finishGame() {
        roundText.textContent = `Round ${ROUND_COUNT} / ${ROUND_COUNT}`;
        statusEl.innerHTML = `<strong>Game complete!</strong> Final score: ${totalScore}.`;
        sceneMeta.textContent = "All rounds are plotted below with guess-to-answer lines.";
      }

      startBtn.addEventListener("click", () => {
        roundIndex = 0;
        totalScore = 0;
        logs.length = 0;
        resultMap.eachLayer((layer) => {
          if (layer instanceof L.Marker || layer instanceof L.Polyline || layer instanceof L.CircleMarker) resultMap.removeLayer(layer);
        });
        scoreText.textContent = "Score: 0";
        renderRound();
      });

      submitBtn.addEventListener("click", () => {
        if (!guessLatLng || roundIndex < 0) return;
        const answer = rounds[roundIndex];
        const distance = haversineKm(guessLatLng, answer);
        const pts = pointsForDistance(distance);
        totalScore += pts;
        scoreText.textContent = `Score: ${totalScore}`;

        statusEl.innerHTML = `Round ${roundIndex + 1}: <strong>${pts}</strong> points, distance <strong>${distance.toFixed(1)} km</strong>.`;
        sceneMeta.textContent = `Answer: ${answer.name}`;

        const guess = [guessLatLng.lat, guessLatLng.lng];
        const actual = [answer.lat, answer.lng];
        L.circleMarker(guess, { radius: 6, color: "#f59e0b" }).addTo(resultMap).bindTooltip(`Guess R${roundIndex + 1}`);
        L.circleMarker(actual, { radius: 6, color: "#10b981" }).addTo(resultMap).bindTooltip(`Actual R${roundIndex + 1}: ${answer.name}`);
        L.polyline([guess, actual], { color: "#38bdf8", dashArray: "6 6" }).addTo(resultMap);

        logs.push({ round: roundIndex + 1, answer: answer.name, distanceKm: Number(distance.toFixed(1)), points: pts });
        submitBtn.disabled = true;
        nextBtn.disabled = false;
      });

      nextBtn.addEventListener("click", () => {
        roundIndex += 1;
        if (roundIndex >= ROUND_COUNT) {
          nextBtn.disabled = true;
          finishGame();
          return;
        }
        renderRound();
      });

      document.getElementById("shareBtn").addEventListener("click", async () => {
        const out = new URL(window.location.href);
        out.searchParams.set("seed", String(seed));
        try {
          await navigator.clipboard.writeText(out.toString());
          statusEl.textContent = `Share URL copied. Same seed = same rounds.`;
        } catch {
          statusEl.innerHTML = `Copy failed. Use this URL manually: <a href="${out}">${out}</a>`;
        }
      });
    </script>
  </body>
</html>
